<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Momentos </title>
    <link rel="stylesheet" href="Css/navbar.css">
    <link rel="stylesheet" href="Css/style.css">
    <link rel="stylesheet" href="Css/momentos.css">
    <link rel="stylesheet" href="Css/wallpaper.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>
    <video autoplay muted loop playsinline class="bg-video" id="bg-video">
        <source id="bg-source" src="assets/video/wallpaper1.mp4" type="video/mp4">
    </video>

    <nav class="navbar">

        <div class="nav-left">
            <span id="welcome"></span>
        </div>

        <div class="nav-center">
            <a href="home.html"> HOME </a>
            <a href="dedicatoria.html"> DEDICATORIA </a>
            <a href="momentos.html"> MOMENTOS </a>
            <a href="mensagens.html"> MENSAGENS </a>
        </div>

        <button id="logout" title="Sair">
            <span class="material-symbols-outlined">logout</span>
        </button>
    </nav>

    <div class="post-box">
        <h1>Melhores Momentos</h1>
        <label for="imageInput" class="upload-btn">
            <span class="material-symbols-outlined">upload_file</span>
            Escolher imagem
        </label>

        <input type="file" id="imageInput" hidden>

        <img id="preview" style="display:none; max-width:200px; margin-top:10px; border-radius:10px;">

        <input type="text" id="caption" placeholder="Escreva algo...">
        <button id="postBtn">Postar</button>
    </div>

    <div id="momentos"></div>

    <script type="module" src="Js/momentos.js"></script>
</body>

</html>
